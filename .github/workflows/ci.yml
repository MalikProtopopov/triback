name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry==2.1.1

      - name: Install dependencies
        run: poetry install --with dev

      - name: Ruff (app/)
        run: poetry run ruff check app/

      - name: Mypy (app/)
        run: poetry run mypy app
      - name: Pytest with coverage (app/services)
        run: |
          poetry run pytest tests/ -v --tb=short \
            --cov=app/services \
            --cov-report=term \
            --cov-report=xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: backend/coverage.xml
          if-no-files-found: warn

  backend-integration:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install poetry==2.1.1
      - run: poetry install --with dev
      - name: Moneta integration tests
        env:
          MONETA_USERNAME: ${{ secrets.MONETA_USERNAME }}
          MONETA_PASSWORD: ${{ secrets.MONETA_PASSWORD }}
          MONETA_PAYEE_ACCOUNT: ${{ secrets.MONETA_PAYEE_ACCOUNT }}
        run: poetry run pytest tests/test_moneta_integration.py -m integration -v --tb=short
